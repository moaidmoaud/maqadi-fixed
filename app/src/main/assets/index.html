<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>مقاضي البيت V2</title>
<style>
:root{--g:#187647;--g2:#e8f5ed;--bg:#f5f7f6;--txt:#172019;--muted:#68736b;--card:#fff;--danger:#b3261e;--line:#e2e8e4}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Tahoma,Arial,sans-serif}.app{max-width:720px;margin:auto;min-height:100vh;padding-bottom:94px}.top{padding:18px;background:linear-gradient(145deg,#176d3f,#249759);color:white;border-radius:0 0 24px 24px}.topbar{display:flex;gap:10px;align-items:center}.title{flex:1}.title h1{margin:0;font-size:26px}.title p{margin:4px 0 0;opacity:.9}.select{border:0;border-radius:12px;padding:10px;background:#ffffff22;color:#fff;font-weight:700;max-width:45%}.select option{color:#111}.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:15px}.pill{background:#ffffff1c;border:1px solid #ffffff32;border-radius:15px;padding:9px;text-align:center}.pill b{display:block;font-size:17px}.pill span{font-size:11px}main{padding:15px}.card{background:#fff;border-radius:18px;padding:14px;box-shadow:0 3px 16px #14241a0c;margin-bottom:13px}.row{display:flex;gap:8px}.input{width:100%;border:1px solid var(--line);background:#fbfcfb;border-radius:13px;padding:12px;font-size:15px;outline:none}.input:focus{border-color:var(--g);box-shadow:0 0 0 3px #18764718}.btn{border:0;border-radius:13px;padding:11px 14px;font-weight:700;font-size:14px;cursor:pointer}.primary{background:var(--g);color:white}.ghost{background:var(--g2);color:var(--g)}.danger{background:#fdecea;color:var(--danger)}.toolbar{display:flex;gap:7px;flex-wrap:wrap}.toolbar .btn{padding:9px 11px;font-size:12px}.budget{display:grid;grid-template-columns:1fr 1fr;gap:8px}.progress{height:9px;background:#e8ece9;border-radius:999px;overflow:hidden;margin-top:10px}.progress>div{height:100%;background:var(--g);width:0}.section{margin:15px 0}.section-title{display:flex;justify-content:space-between;align-items:center;margin:0 4px 7px}.section-title h2{font-size:17px;margin:0}.badge{background:var(--g2);color:var(--g);border-radius:999px;padding:4px 9px;font-size:12px}.item{display:flex;align-items:center;gap:9px;background:white;border-radius:14px;padding:11px;margin-bottom:7px;box-shadow:0 2px 9px #15251a08}.check{width:24px;height:24px;accent-color:var(--g)}.item-main{flex:1;min-width:0}.name{font-weight:650}.meta{font-size:12px;color:var(--muted);margin-top:3px}.done{opacity:.65}.done .name{text-decoration:line-through}.iconbtn{border:0;background:transparent;font-size:19px;padding:5px;color:#667269}.empty{text-align:center;color:var(--muted);padding:38px 10px}.empty b{display:block;font-size:40px;margin-bottom:7px}.bottom{position:fixed;bottom:0;left:0;right:0;max-width:720px;margin:auto;background:#fffffff0;backdrop-filter:blur(14px);border-top:1px solid var(--line);display:flex;gap:9px;padding:10px 14px calc(10px + env(safe-area-inset-bottom))}.bottom .btn{flex:1}dialog{border:0;border-radius:20px;width:min(92vw,440px);padding:0;box-shadow:0 20px 70px #0004}dialog::backdrop{background:#0007}.modal{padding:18px}.modal h3{margin:0 0 12px}.modal .input{margin-bottom:8px}.actions{display:flex;gap:8px;margin-top:8px}.search{margin-top:10px}.smallnote{font-size:12px;color:var(--muted);margin-top:7px}@media(max-width:480px){.summary{grid-template-columns:repeat(2,1fr)}.row{flex-direction:column}.select{max-width:52%}}
</style></head><body><div class="app">
<header class="top"><div class="topbar"><div class="title"><h1>مقاضي البيت</h1><p>قوائم مرتبة أثناء التسوق</p></div><select id="listSelect" class="select"></select></div>
<div class="summary"><div class="pill"><b id="remaining">0</b><span>متبقي</span></div><div class="pill"><b id="doneCount">0</b><span>تم أخذه</span></div><div class="pill"><b id="total">0 ر.س</b><span>الإجمالي</span></div><div class="pill"><b id="percent">0٪</b><span>الإنجاز</span></div></div></header>
<main>
<section class="card"><div class="row"><textarea id="newItems" class="input" rows="3" placeholder="اكتب أو الصق المقاضي، كل غرض في سطر"></textarea><button id="addBtn" class="btn primary">إضافة</button></div><input id="search" class="input search" placeholder="بحث داخل القائمة"><div class="smallnote">يحذف المكرر ويرتب المنتجات حسب القسم تلقائيًا.</div></section>
<section class="card"><b>الميزانية</b><div class="budget"><input id="budget" class="input" inputmode="decimal" placeholder="الميزانية بالريال"><div id="budgetStatus" class="input">لم تحدد ميزانية</div></div><div class="progress"><div id="progressBar"></div></div></section>
<div class="toolbar"><button id="newListBtn" class="btn ghost">قائمة جديدة</button><button id="renameBtn" class="btn ghost">إعادة تسمية</button><button id="sampleBtn" class="btn ghost">قائمة المقاضي السابقة</button><button id="uncheckBtn" class="btn ghost">إلغاء الشطب</button><button id="clearDoneBtn" class="btn danger">حذف المشطوب</button></div>
<div id="list"></div></main>
<nav class="bottom"><button class="btn primary" onclick="newItems.focus()">＋ إضافة أغراض</button><button id="shareBtn" class="btn ghost">مشاركة</button></nav></div>
<dialog id="editDialog"><form method="dialog" class="modal"><h3>تعديل الغرض</h3><input id="editName" class="input" placeholder="اسم الغرض"><input id="editQty" class="input" inputmode="numeric" placeholder="الكمية"><input id="editPrice" class="input" inputmode="decimal" placeholder="السعر التقريبي للوحدة"><div class="actions"><button class="btn primary" value="save">حفظ</button><button class="btn ghost" value="cancel">إلغاء</button></div></form></dialog>
<script>
const storeKey='maqadi_v3_lists';
const cats={'الخضار والفواكه':['فطر','مشروم','بروكلي','جزر','كوسا','بقدونس','كزبرة','قرنبيط','سبانخ','فاصوليا','بصل','ثوم','طماطم','خيار','بطاطس','ليمون'],'اللحوم والدواجن':['دجاج','صدور','لحم','مفروم'],'الأسماك':['سلمون','هامور','تونة','سمك'],'الألبان والبيض':['حليب','لبنة','بيض','جبن','زبادي'],'الأرز والمعكرونة':['أرز','رز','مكرونة','سباغيتي','شعيرية'],'المعلبات':['معلب','معلبة','فول','حمص'],'المستلزمات المنزلية':['سفرة','مناديل','صابون','منظف','أكياس']};const order=[...Object.keys(cats),'أخرى'];
let data=JSON.parse(localStorage.getItem(storeKey)||'null')||{active:'l1',lists:{l1:{name:'مقاضي الأسبوع',budget:'',items:[]}}};let editingId=null;
const $=id=>document.getElementById(id);const active=()=>data.lists[data.active];function category(name){for(const [c,ks] of Object.entries(cats))if(ks.some(k=>name.includes(k)))return c;return'أخرى'}function esc(s){return String(s).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}function save(){localStorage.setItem(storeKey,JSON.stringify(data));render()}
function uid(){return crypto.randomUUID?crypto.randomUUID():Date.now()+Math.random()}
function renderSelect(){listSelect.innerHTML='';Object.entries(data.lists).forEach(([id,l])=>{const o=document.createElement('option');o.value=id;o.textContent=l.name;o.selected=id===data.active;listSelect.appendChild(o)})}
function render(){renderSelect();const l=active();budget.value=l.budget||'';const q=search.value.trim();const shown=l.items.filter(i=>!q||i.name.includes(q));const host=$('list');host.innerHTML='';if(!shown.length)host.innerHTML='<div class="empty"><b>🛒</b>لا توجد أغراض مطابقة</div>';const grouped={};order.forEach(c=>grouped[c]=[]);shown.forEach(i=>(grouped[i.category]||grouped['أخرى']).push(i));for(const c of order){const arr=grouped[c];if(!arr.length)continue;const sec=document.createElement('section');sec.className='section';sec.innerHTML=`<div class="section-title"><h2>${c}</h2><span class="badge">${arr.length}</span></div>`;arr.sort((a,b)=>a.done-b.done).forEach(i=>{const d=document.createElement('div');d.className='item'+(i.done?' done':'');d.innerHTML=`<input class="check" type="checkbox" ${i.done?'checked':''}><div class="item-main"><div class="name">${esc(i.name)}</div><div class="meta">الكمية: ${i.qty||1}${i.price?` • ${Number(i.price).toFixed(2)} ر.س للوحدة`:''}</div></div><button class="iconbtn edit">✎</button><button class="iconbtn del">×</button>`;d.querySelector('.check').onchange=e=>{i.done=e.target.checked;save()};d.querySelector('.del').onclick=()=>{l.items=l.items.filter(x=>x.id!==i.id);save()};d.querySelector('.edit').onclick=()=>openEdit(i);sec.appendChild(d)});host.appendChild(sec)}const done=l.items.filter(i=>i.done).length,total=l.items.reduce((s,i)=>s+(+i.price||0)*(+i.qty||1),0),pct=l.items.length?Math.round(done/l.items.length*100):0;doneCount.textContent=done;remaining.textContent=l.items.length-done;percent.textContent=pct+'٪';totalEl=total.toFixed(2)+' ر.س';$('total').textContent=totalEl;progressBar.style.width=pct+'%';updateBudget(total)}
function addText(text){const l=active();const parts=text.split(/[\n،,]+/).map(x=>x.trim()).filter(Boolean);for(const name of parts){if(!l.items.some(i=>i.name.trim().toLowerCase()===name.toLowerCase()))l.items.push({id:uid(),name,category:category(name),qty:1,price:0,done:false})}save()}
addBtn.onclick=()=>{addText(newItems.value);newItems.value=''};search.oninput=render;listSelect.onchange=()=>{data.active=listSelect.value;save()};budget.oninput=()=>{active().budget=budget.value;save()};
function updateBudget(total){const b=+budget.value,s=budgetStatus;if(!b){s.textContent='لم تحدد ميزانية';return}const diff=b-total;s.textContent=diff>=0?`متبقي ${diff.toFixed(2)} ر.س`:`تجاوزت بـ ${Math.abs(diff).toFixed(2)} ر.س`}
newListBtn.onclick=()=>{const name=prompt('اسم القائمة الجديدة','مقاضي جديدة');if(!name)return;const id=uid();data.lists[id]={name,budget:'',items:[]};data.active=id;save()};renameBtn.onclick=()=>{const n=prompt('اسم القائمة',active().name);if(n){active().name=n;save()}};
sampleBtn.onclick=()=>addText('فطر\nبروكلي\nجزر\nكوسا\nبقدونس\nكزبرة\nقرنبيط\nسبانخ\nفاصوليا خضراء\nبصل\nثوم\nصدور دجاج\nلحم بقري مفروم\nسلمون\nسمك هامور\nتونة معلبة\nحليب\nلبنة\nبيض\nأرز بني\nمكرونة سباغيتي\nسفرة');uncheckBtn.onclick=()=>{active().items.forEach(i=>i.done=false);save()};clearDoneBtn.onclick=()=>{active().items=active().items.filter(i=>!i.done);save()};
function openEdit(i){editingId=i.id;editName.value=i.name;editQty.value=i.qty||1;editPrice.value=i.price||'';editDialog.showModal()}editDialog.addEventListener('close',()=>{if(editDialog.returnValue!=='save')return;const i=active().items.find(x=>x.id===editingId);if(!i)return;i.name=editName.value.trim()||i.name;i.category=category(i.name);i.qty=Math.max(1,parseInt(editQty.value)||1);i.price=Math.max(0,parseFloat(editPrice.value)||0);save()});
shareBtn.onclick=async()=>{const l=active(),txt=order.flatMap(c=>l.items.filter(i=>i.category===c&&!i.done).map(i=>`☐ ${i.name}${i.qty>1?' × '+i.qty:''}`)).join('\n');try{if(navigator.share)await navigator.share({title:l.name,text:txt});else{await navigator.clipboard.writeText(txt);alert('تم نسخ القائمة')}}catch(e){}};render();
</script></body></html>
