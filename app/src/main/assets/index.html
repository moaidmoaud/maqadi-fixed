<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#0f6b45">
<title>مقاضي - Sprint 2</title>
<style>
:root{--primary:#0f6b45;--primary2:#138455;--soft:#e9f5ef;--bg:#f4f7f5;--card:#fff;--text:#162019;--muted:#69756d;--line:#e2e9e5;--danger:#b3261e;--warn:#a95f00;--shadow:0 10px 30px rgba(18,49,34,.08)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Tahoma,Arial,sans-serif}button,input,textarea,select{font:inherit}.app{max-width:720px;margin:auto;min-height:100vh;padding-bottom:96px}.hero{padding:22px 18px 28px;background:linear-gradient(145deg,#0d5d3c,#13905a);color:white;border-radius:0 0 30px 30px;box-shadow:0 14px 36px rgba(15,107,69,.22)}.hero-row{display:flex;align-items:center;gap:12px}.logo{width:50px;height:50px;border-radius:17px;display:grid;place-items:center;background:#ffffff20;border:1px solid #ffffff38;font-size:26px}.hero-title{flex:1}.hero-title h1{margin:0;font-size:28px;letter-spacing:-.3px}.hero-title p{margin:5px 0 0;opacity:.9;font-size:14px}.icon-btn{border:0;background:#ffffff1f;color:white;width:44px;height:44px;border-radius:14px;font-size:20px}.overview{margin:18px 14px 0;background:#fff;border-radius:24px;padding:16px;box-shadow:var(--shadow);color:var(--text)}.overview-head{display:flex;align-items:center;gap:10px}.overview-title{flex:1}.overview-title b{display:block;font-size:18px}.overview-title span{font-size:13px;color:var(--muted)}.select-list{border:1px solid var(--line);background:#f8faf9;border-radius:12px;padding:9px 11px;max-width:47%;font-weight:700;color:var(--text)}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:15px}.stat{background:var(--soft);border-radius:16px;padding:10px 6px;text-align:center}.stat strong{display:block;font-size:19px;color:var(--primary)}.stat small{display:block;color:var(--muted);font-size:11px;margin-top:2px}.progress{height:10px;border-radius:999px;background:#e8eeea;overflow:hidden;margin-top:14px}.progress>div{height:100%;width:0;background:linear-gradient(90deg,var(--primary),#27a66e);transition:.25s}.content{padding:14px}.section-card{background:var(--card);border-radius:22px;padding:16px;margin-bottom:13px;box-shadow:var(--shadow)}.section-head{display:flex;align-items:center;margin-bottom:12px}.section-head h2{margin:0;font-size:18px;flex:1}.section-head span{font-size:12px;color:var(--muted)}.quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}.quick{border:1px solid var(--line);background:#fbfcfb;border-radius:17px;padding:11px 5px;text-align:center;min-height:82px;cursor:pointer}.quick:active{transform:scale(.97)}.quick .emoji{font-size:25px;display:block}.quick b{font-size:12px;display:block;margin-top:6px}.add-wrap{display:grid;grid-template-columns:1fr auto;gap:9px}.field{width:100%;border:1px solid var(--line);background:#fbfcfb;border-radius:15px;padding:13px 14px;font-size:15px;outline:none}.field:focus{border-color:var(--primary);box-shadow:0 0 0 4px rgba(15,107,69,.1)}textarea.field{resize:none;min-height:84px}.btn{border:0;border-radius:15px;padding:12px 16px;font-weight:800;cursor:pointer}.btn-primary{background:var(--primary);color:#fff}.btn-soft{background:var(--soft);color:var(--primary)}.btn-danger{background:#fdecea;color:var(--danger)}.action-row{display:flex;gap:8px;flex-wrap:wrap}.action-row .btn{font-size:12px;padding:10px 12px}.search{margin-top:10px}.budget-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}.budget-box{border:1px solid var(--line);border-radius:15px;padding:12px;background:#fbfcfb}.budget-box small{display:block;color:var(--muted);font-size:11px}.budget-box b{display:block;margin-top:4px;font-size:16px}.category{margin:16px 0}.category-head{display:flex;align-items:center;padding:0 4px 8px}.category-head h3{margin:0;flex:1;font-size:17px}.badge{background:var(--soft);color:var(--primary);padding:5px 10px;border-radius:999px;font-size:12px;font-weight:700}.item{display:flex;align-items:center;gap:11px;background:#fff;border:1px solid #edf1ef;border-radius:17px;padding:12px;margin-bottom:8px;box-shadow:0 3px 12px rgba(20,50,35,.04)}.check{width:25px;height:25px;accent-color:var(--primary)}.item-body{flex:1;min-width:0}.item-name{font-weight:800;font-size:15px}.item-meta{color:var(--muted);font-size:12px;margin-top:4px}.item.done{opacity:.58}.item.done .item-name{text-decoration:line-through}.mini{border:0;background:#f0f4f2;color:#546259;width:35px;height:35px;border-radius:12px;font-size:18px}.empty{text-align:center;padding:38px 10px;color:var(--muted)}.empty .big{font-size:48px;display:block;margin-bottom:8px}.empty b{display:block;color:var(--text);font-size:17px}.bottom-nav{position:fixed;bottom:0;left:0;right:0;max-width:720px;margin:auto;padding:9px 14px calc(9px + env(safe-area-inset-bottom));background:rgba(255,255,255,.94);backdrop-filter:blur(16px);border-top:1px solid var(--line);display:grid;grid-template-columns:1fr 1.4fr 1fr;gap:9px}.nav-btn{border:0;border-radius:16px;padding:11px 7px;background:#f2f5f3;color:#4e5c53;font-weight:700;font-size:12px}.nav-main{background:var(--primary);color:white;font-size:14px}.screen{display:none}.screen.active{display:block}dialog{border:0;border-radius:22px;width:min(92vw,460px);padding:0;box-shadow:0 25px 80px rgba(0,0,0,.35)}dialog::backdrop{background:#0008}.modal{padding:20px}.modal h3{margin:0 0 14px}.modal .field{margin-bottom:9px}.modal-actions{display:flex;gap:8px;margin-top:6px}.modal-actions .btn{flex:1}.toast{position:fixed;left:50%;bottom:100px;transform:translateX(-50%) translateY(25px);background:#17231c;color:white;border-radius:14px;padding:11px 16px;opacity:0;pointer-events:none;transition:.25s;z-index:50;font-size:13px}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:480px){.stats{grid-template-columns:repeat(2,1fr)}.quick-grid{grid-template-columns:repeat(4,1fr)}.add-wrap{grid-template-columns:1fr}.add-wrap .btn{width:100%}.hero{padding-top:18px}.overview{margin-top:14px}.budget-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="app">
<header class="hero">
  <div class="hero-row"><div class="logo">🛒</div><div class="hero-title"><h1>مقاضي</h1><p>قائمتك مرتبة، وتسوقك أسرع</p></div><button class="icon-btn" id="themeBtn">☾</button></div>
</header>
<div class="overview">
  <div class="overview-head"><div class="overview-title"><b id="greeting">قائمة اليوم</b><span id="overviewText">ابدأ بإضافة احتياجات البيت</span></div><select id="listSelect" class="select-list"></select></div>
  <div class="stats"><div class="stat"><strong id="remaining">0</strong><small>متبقي</small></div><div class="stat"><strong id="doneCount">0</strong><small>تم أخذه</small></div><div class="stat"><strong id="total">0</strong><small>ريال متوقع</small></div><div class="stat"><strong id="percent">0٪</strong><small>الإنجاز</small></div></div>
  <div class="progress"><div id="progressBar"></div></div>
</div>

<main class="content">
<section id="homeScreen" class="screen active">
  <div class="section-card">
    <div class="section-head"><h2>إضافة سريعة</h2><span>ضغطة واحدة</span></div>
    <div class="quick-grid" id="quickGrid"></div>
  </div>
  <div class="section-card">
    <div class="section-head"><h2>أضف المقاضي</h2><span>يمكن لصق قائمة كاملة</span></div>
    <div class="add-wrap"><textarea id="newItems" class="field" placeholder="مثال: حليب، بيض، خبز\nكل غرض في سطر"></textarea><button id="addBtn" class="btn btn-primary">إضافة</button></div>
    <input id="search" class="field search" placeholder="🔍 ابحث داخل القائمة">
  </div>
  <div class="section-card">
    <div class="section-head"><h2>الميزانية</h2><span>اختياري</span></div>
    <div class="budget-grid"><input id="budget" class="field" inputmode="decimal" placeholder="الميزانية بالريال"><div class="budget-box"><small>الحالة</small><b id="budgetStatus">لم تحدد ميزانية</b></div></div>
  </div>
  <div class="section-card"><div class="action-row"><button id="newListBtn" class="btn btn-soft">＋ قائمة جديدة</button><button id="renameBtn" class="btn btn-soft">تسمية القائمة</button><button id="sampleBtn" class="btn btn-soft">قائمة جاهزة</button><button id="uncheckBtn" class="btn btn-soft">إلغاء الشطب</button><button id="clearDoneBtn" class="btn btn-danger">حذف المشتريات</button></div></div>
  <div id="list"></div>
</section>
<section id="shoppingScreen" class="screen">
  <div class="section-card"><div class="section-head"><h2>وضع التسوق</h2><span>اضغط على الغرض عند أخذه</span></div><div id="shoppingList"></div></div>
</section>
</main>
<nav class="bottom-nav"><button id="homeBtn" class="nav-btn">⌂<br>الرئيسية</button><button id="shopBtn" class="nav-btn nav-main">▶ ابدأ التسوق</button><button id="shareBtn" class="nav-btn">↗<br>مشاركة</button></nav>
</div>
<dialog id="editDialog"><form method="dialog" class="modal"><h3>تعديل الغرض</h3><input id="editName" class="field" placeholder="اسم الغرض"><input id="editQty" class="field" inputmode="numeric" placeholder="الكمية"><input id="editPrice" class="field" inputmode="decimal" placeholder="السعر التقريبي للوحدة"><div class="modal-actions"><button class="btn btn-primary" value="save">حفظ</button><button class="btn btn-soft" value="cancel">إلغاء</button></div></form></dialog>
<div id="toast" class="toast"></div>
<script>
const storeKey='maqadi_sprint2_data';
const categories={'الخضار والفواكه':['فطر','مشروم','بروكلي','جزر','كوسا','بقدونس','كزبرة','قرنبيط','سبانخ','فاصوليا','بصل','ثوم','طماطم','خيار','بطاطس','ليمون','موز','تفاح'],'اللحوم والدواجن':['دجاج','صدور','لحم','مفروم'],'الأسماك':['سلمون','هامور','تونة','سمك'],'الألبان والبيض':['حليب','لبنة','بيض','جبن','زبادي'],'المخبوزات':['خبز','توست','صامولي'],'الأرز والمعكرونة':['أرز','رز','مكرونة','سباغيتي','شعيرية'],'المعلبات':['معلب','معلبة','فول','حمص'],'المستلزمات المنزلية':['سفرة','مناديل','صابون','منظف','أكياس']};
const categoryOrder=[...Object.keys(categories),'أخرى'];
const quickItems=[['🥛','حليب'],['🥚','بيض'],['🍞','خبز'],['🍗','دجاج'],['🍚','أرز'],['🧀','جبن'],['💧','ماء'],['🍅','طماطم']];
let data=JSON.parse(localStorage.getItem(storeKey)||'null')||{active:'l1',lists:{l1:{name:'مقاضي الأسبوع',budget:'',items:[]}},dark:false};
let editingId=null;const $=id=>document.getElementById(id);const active=()=>data.lists[data.active];
function uid(){return crypto.randomUUID?crypto.randomUUID():Date.now()+Math.random()}
function cat(name){for(const [c,keys] of Object.entries(categories))if(keys.some(k=>name.includes(k)))return c;return'أخرى'}
function esc(s){return String(s).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1700)}
function save(){localStorage.setItem(storeKey,JSON.stringify(data));render()}
function addText(text){const list=active();const parts=text.split(/[\n،,]+/).map(x=>x.trim()).filter(Boolean);let added=0;for(const name of parts){if(!list.items.some(i=>i.name.trim().toLowerCase()===name.toLowerCase())){list.items.push({id:uid(),name,category:cat(name),qty:1,price:0,done:false});added++}}save();if(added)toast(`تمت إضافة ${added} غرض`);else if(parts.length)toast('الغرض موجود مسبقًا')}
function renderSelect(){listSelect.innerHTML='';Object.entries(data.lists).forEach(([id,l])=>{const o=document.createElement('option');o.value=id;o.textContent=l.name;o.selected=id===data.active;listSelect.appendChild(o)})}
function itemHtml(i,shopping=false){return `<input class="check" type="checkbox" ${i.done?'checked':''}><div class="item-body"><div class="item-name">${esc(i.name)}</div><div class="item-meta">الكمية: ${i.qty||1}${i.price?` • ${Number(i.price).toFixed(2)} ر.س للوحدة`:''}</div></div>${shopping?'':`<button class="mini edit">✎</button><button class="mini del">×</button>`}`}
function bindItem(el,i,shopping=false){el.querySelector('.check').onchange=e=>{i.done=e.target.checked;save();if(i.done)toast('تم الشطب ✓')};if(!shopping){el.querySelector('.del').onclick=()=>{active().items=active().items.filter(x=>x.id!==i.id);save()};el.querySelector('.edit').onclick=()=>openEdit(i)}}
function renderGroups(host,items,shopping=false){host.innerHTML='';if(!items.length){host.innerHTML='<div class="empty"><span class="big">🛒</span><b>القائمة فارغة</b><span>أضف أول غرض وابدأ التسوق</span></div>';return}const grouped={};categoryOrder.forEach(c=>grouped[c]=[]);items.forEach(i=>(grouped[i.category]||grouped['أخرى']).push(i));for(const c of categoryOrder){const arr=grouped[c];if(!arr.length)continue;const sec=document.createElement('section');sec.className='category';sec.innerHTML=`<div class="category-head"><h3>${c}</h3><span class="badge">${arr.length}</span></div>`;arr.sort((a,b)=>Number(a.done)-Number(b.done)).forEach(i=>{const el=document.createElement('div');el.className='item'+(i.done?' done':'');el.innerHTML=itemHtml(i,shopping);bindItem(el,i,shopping);sec.appendChild(el)});host.appendChild(sec)}}
function render(){renderSelect();const l=active();budget.value=l.budget||'';const q=search.value.trim();const filtered=l.items.filter(i=>!q||i.name.includes(q));renderGroups($('list'),filtered,false);renderGroups($('shoppingList'),l.items,false);const done=l.items.filter(i=>i.done).length;const total=l.items.reduce((s,i)=>s+(+i.price||0)*(+i.qty||1),0);const pct=l.items.length?Math.round(done/l.items.length*100):0;remaining.textContent=l.items.length-done;doneCount.textContent=done;total.textContent=total.toFixed(0);percent.textContent=pct+'٪';progressBar.style.width=pct+'%';overviewText.textContent=l.items.length?`${l.items.length} غرض في ${l.name}`:'ابدأ بإضافة احتياجات البيت';updateBudget(total)}
function updateBudget(totalValue){const b=+budget.value;if(!b){budgetStatus.textContent='لم تحدد ميزانية';budgetStatus.style.color='';return}const diff=b-totalValue;budgetStatus.textContent=diff>=0?`متبقي ${diff.toFixed(0)} ر.س`:`تجاوزت بـ ${Math.abs(diff).toFixed(0)} ر.س`;budgetStatus.style.color=diff>=0?'var(--primary)':'var(--danger)'}
quickItems.forEach(([emoji,name])=>{const b=document.createElement('button');b.className='quick';b.innerHTML=`<span class="emoji">${emoji}</span><b>${name}</b>`;b.onclick=()=>addText(name);quickGrid.appendChild(b)});
addBtn.onclick=()=>{addText(newItems.value);newItems.value=''};search.oninput=render;listSelect.onchange=()=>{data.active=listSelect.value;save()};budget.oninput=()=>{active().budget=budget.value;save()};
newListBtn.onclick=()=>{const name=prompt('اسم القائمة الجديدة','مقاضي جديدة');if(!name)return;const id=uid();data.lists[id]={name,budget:'',items:[]};data.active=id;save()};renameBtn.onclick=()=>{const n=prompt('اسم القائمة',active().name);if(n){active().name=n;save()}};
sampleBtn.onclick=()=>addText('فطر\nبروكلي\nجزر\nكوسا\nبقدونس\nكزبرة\nقرنبيط\nسبانخ\nبصل\nثوم\nصدور دجاج\nلحم بقري مفروم\nسلمون\nسمك هامور\nتونة معلبة\nحليب\nلبنة\nبيض\nأرز بني\nمكرونة سباغيتي');
uncheckBtn.onclick=()=>{active().items.forEach(i=>i.done=false);save()};clearDoneBtn.onclick=()=>{active().items=active().items.filter(i=>!i.done);save()};
function openEdit(i){editingId=i.id;editName.value=i.name;editQty.value=i.qty||1;editPrice.value=i.price||'';editDialog.showModal()}
editDialog.addEventListener('close',()=>{if(editDialog.returnValue!=='save')return;const i=active().items.find(x=>x.id===editingId);if(!i)return;i.name=editName.value.trim()||i.name;i.category=cat(i.name);i.qty=Math.max(1,parseInt(editQty.value)||1);i.price=Math.max(0,parseFloat(editPrice.value)||0);save();toast('تم حفظ التعديل')});
function showScreen(name){homeScreen.classList.toggle('active',name==='home');shoppingScreen.classList.toggle('active',name==='shopping');shopBtn.textContent=name==='shopping'?'✓ إنهاء التسوق':'▶ ابدأ التسوق';window.scrollTo({top:0,behavior:'smooth'})}
homeBtn.onclick=()=>showScreen('home');shopBtn.onclick=()=>showScreen(shoppingScreen.classList.contains('active')?'home':'shopping');
shareBtn.onclick=async()=>{const l=active(),txt=categoryOrder.flatMap(c=>l.items.filter(i=>i.category===c&&!i.done).map(i=>`☐ ${i.name}${i.qty>1?' × '+i.qty:''}`)).join('\n');try{if(navigator.share)await navigator.share({title:l.name,text:txt});else{await navigator.clipboard.writeText(txt);toast('تم نسخ القائمة')}}catch(e){}};
render();
</script>
</body></html>
